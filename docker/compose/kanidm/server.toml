version = "2"
bindaddress = "0.0.0.0:8443"
ldapbindaddress = "0.0.0.0:3636"
db_path = "/data/kanidm.db"

# TLS interne (obligatoire pour Kanidm)
tls_chain = "/data/chain.pem"
tls_key = "/data/key.pem"

domain = ""
origin = ""

# Configuration Trust pour Nginx Proxy Manager
[http_client_address_info]
x-forward-for = ["127.0.0.1", "172.16.0.0/12"]

[online_backup]
path = "/data/backups/"
schedule = "00 22 * * *"
